<!doctype html>
<html lang="pt-BR">
<head>

<title>Story 3 — Oferta + Escassez</title>
<link rel="stylesheet" href="_base.css">
<style>
  .metric-row { display: flex; align-items: baseline; gap: 32px; }
  .metric-label { font-size: 56px; font-weight: 700; line-height: 1.1; letter-spacing: -0.01em; }
  .criteria-block { margin-top: 64px; }
  .criteria-eyebrow { font-size: 24px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--brasa); margin-bottom: 24px; }

<div class="frame dark">

  <div class="top-row">

      <div class="criteria-eyebrow">CRITÉRIO</div>

        <li>Faturamento R$800k/mês ou mais</li>
        <li>Time de vendas com 2+ pessoas</li>
        <li>Trabalha com administradora independente</li>
      </ul>
    </div>
  </div>

    <span>3 de 5</span>

  </div>

</div>
