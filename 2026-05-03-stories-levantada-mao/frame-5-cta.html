<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Story 5 — CTA</title>
<link rel="stylesheet" href="_base.css">
<style>
  .cta-headline { font-size: 92px; font-weight: 700; line-height: 1.05; letter-spacing: -0.02em; }
  .cta-card {
    background: var(--carvao);
    color: var(--offwhite);
    padding: 64px;
    margin-top: 80px;
  }
  .cta-card .label { font-size: 24px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.6; }
  .cta-card .keyword {
    font-size: 144px;
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 1;
    color: var(--brasa);
    margin: 24px 0 32px;
  }
  .cta-card .where { font-size: 32px; font-weight: 400; line-height: 1.4; }
</style>
</head>
<body>
<div class="frame brasa">

  <div class="top-row">
    <img src="logo-lockup-dark.svg" alt="Hurtz">
  </div>

  <div class="center-block">
    <div class="eyebrow" style="color: var(--carvao);">PRÓXIMO PASSO</div>
    <hr class="divider-accent">
    <h1 class="cta-headline">Manda mensagem<br>aqui no direct.</h1>

    <div class="cta-card">
      <div class="label">DIGITA A PALAVRA</div>
      <div class="keyword">VAGA</div>
      <div class="where">Vou olhar seu perfil e te dizer<br>se faz sentido pro seu modelo.</div>
    </div>
  </div>

  <div class="bottom-row">
    <span>3 vagas · maio 2026</span>
    <span>5 / 5</span>
  </div>

</div>
</body>
</html>
