<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Hurtz Company · Projeto 3M em 3 Meses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#000;}
body{font-family:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  </style>
  <script>
(() => {
  const DW = 1920, DH = 1080;
  const stylesheet = `
    :host{position:fixed;inset:0;display:block;background:#000;overflow:hidden;}
    .stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
    .canvas{position:relative;transform-origin:center center;flex-shrink:0;will-change:transform;}
    ::slotted(*){position:absolute!important;inset:0!important;width:100%!important;height:100%!important;
      box-sizing:border-box!important;overflow:hidden;opacity:0;pointer-events:none;visibility:hidden;}
    ::slotted([data-deck-active]){opacity:1;pointer-events:auto;visibility:visible;}
    .tapzones{position:fixed;inset:0;display:flex;z-index:2147482000;pointer-events:none;}
    .tapzone{flex:1;pointer-events:auto;-webkit-tap-highlight-color:transparent;}
    .tapzone--mid{pointer-events:none;}
    .overlay{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;align-items:center;
      gap:8px;background:rgba(0,0,0,.8);color:#fff;border-radius:999px;padding:8px 18px;
      font-size:14px;font-family:inherit;opacity:0;transition:opacity .2s;pointer-events:none;z-index:2147483000;}
    .overlay[data-visible]{opacity:1;pointer-events:auto;}
    .overlay button{background:none;border:none;color:#fff;cursor:pointer;padding:4px 10px;
      border-radius:4px;font-size:14px;display:flex;align-items:center;gap:4px;font-family:inherit;}
    .overlay button:hover{background:rgba(255,255,255,.15);}
    .overlay button svg{width:16px;height:16px;}
    .overlay .count{min-width:48px;text-align:center;font-variant-numeric:tabular-nums;}
    .overlay .sep{opacity:.4;}
    .overlay .div{width:1px;height:16px;background:rgba(255,255,255,.25);margin:0 4px;}
    .overlay .kbd{background:rgba(255,255,255,.15);border-radius:3px;padding:1px 6px;font-size:12px;margin-left:4px;}
    @media print{html,body{margin:0!important;padding:0!important;background:none!important;
      overflow:visible!important;height:auto!important;}*{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
  `;
  class DeckStage extends HTMLElement {
    constructor(){
      super();
      this._root=this.attachShadow({mode:'open'});
      this._slides=[];this._index=0;this._hideTimer=null;
      this._onKey=this._onKey.bind(this);
      this._onResize=this._onResize.bind(this);
      this._onMouseMove=this._onMouseMove.bind(this);
      this._onSlotChange=this._onSlotChange.bind(this);
      this._render();
    }
    connectedCallback(){
      window.addEventListener('keydown',this._onKey);
      window.addEventListener('resize',this._onResize);
      window.addEventListener('mousemove',this._onMouseMove,{passive:true});
    }
    disconnectedCallback(){
      window.removeEventListener('keydown',this._onKey);
      window.removeEventListener('resize',this._onResize);
      window.removeEventListener('mousemove',this._onMouseMove);
    }
    _render(){
      const s=document.createElement('style');s.textContent=stylesheet;
      const stage=document.createElement('div');stage.className='stage';
      const canvas=document.createElement('div');canvas.className='canvas';
      canvas.style.width=DW+'px';canvas.style.height=DH+'px';
      const slot=document.createElement('slot');
      slot.addEventListener('slotchange',this._onSlotChange);
      canvas.appendChild(slot);stage.appendChild(canvas);
      const tz=document.createElement('div');tz.className='tapzones';tz.setAttribute('aria-hidden','true');
      const tb=document.createElement('div');tb.className='tapzone';
      const tm=document.createElement('div');tm.className='tapzone tapzone--mid';tm.style.pointerEvents='none';
      const tf=document.createElement('div');tf.className='tapzone';
      tb.addEventListener('click',()=>this._go(this._index-1));
      tf.addEventListener('click',()=>this._go(this._index+1));
      tz.append(tb,tm,tf);
      const ov=document.createElement('div');ov.className='overlay';
      ov.innerHTML=`<button class="prev" aria-label="Anterior"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg></button><span class="count"><span class="cur">1</span><span class="sep">/</span><span class="tot">1</span></span><button class="next" aria-label="Próximo"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3l5 5-5 5"/></svg></button><span class="div"></span><button class="rst">Reset<span class="kbd">R</span></button>`;
      ov.querySelector('.prev').addEventListener('click',()=>this._go(this._index-1));
      ov.querySelector('.next').addEventListener('click',()=>this._go(this._index+1));
      ov.querySelector('.rst').addEventListener('click',()=>this._go(0));
      this._root.append(s,stage,tz,ov);
      this._canvas=canvas;this._slot=slot;this._overlay=ov;
      this._curEl=ov.querySelector('.cur');this._totEl=ov.querySelector('.tot');
      this._syncPrint();
    }
    _syncPrint(){
      let t=document.getElementById('_dp');
      if(!t){t=document.createElement('style');t.id='_dp';document.head.appendChild(t);}
      t.textContent=`@page{size:${DW}px ${DH}px;margin:0;}`;
    }
    _onSlotChange(){
      const els=this._slot.assignedElements({flatten:true}).filter(e=>!['TEMPLATE','SCRIPT','STYLE'].includes(e.tagName));
      this._slides=els;
      els.forEach((el,i)=>el.setAttribute('data-deck-slide',i));
      if(this._totEl)this._totEl.textContent=String(els.length||1);
      const h=(location.hash||'').match(/^#(\d+)$/);
      if(h){const n=parseInt(h[1],10)-1;if(n>=0&&n<els.length)this._index=n;}
      this._apply(false);
      this._fit();
    }
    _apply(flash=true){
      if(!this._slides.length)return;
      const i=this._index;
      try{history.replaceState(null,'','#'+(i+1));}catch(e){}
      this._slides.forEach((s,j)=>{
        if(j===i)s.setAttribute('data-deck-active','');
        else s.removeAttribute('data-deck-active');
      });
      if(this._curEl)this._curEl.textContent=String(i+1);
      if(flash)this._flash();
    }
    _flash(){
      if(!this._overlay)return;
      this._overlay.setAttribute('data-visible','');
      clearTimeout(this._hideTimer);
      this._hideTimer=setTimeout(()=>this._overlay.removeAttribute('data-visible'),1800);
    }
    _fit(){
      if(!this._canvas)return;
      const s=Math.min(window.innerWidth/DW,window.innerHeight/DH);
      this._canvas.style.transform=`scale(${s})`;
    }
    _go(i){
      if(!this._slides.length)return;
      this._index=Math.max(0,Math.min(this._slides.length-1,i));
      this._apply();
    }
    _onResize(){this._fit();}
    _onMouseMove(){this._flash();}
    _onKey(e){
      if(e.target&&(e.target.isContentEditable||/^(INPUT|TEXTAREA|SELECT)$/.test(e.target.tagName)))return;
      if(e.metaKey||e.ctrlKey||e.altKey)return;
      const k=e.key;
      if(k==='ArrowRight'||k==='PageDown'||k===' '){e.preventDefault();this._go(this._index+1);}
      else if(k==='ArrowLeft'||k==='PageUp'){e.preventDefault();this._go(this._index-1);}
      else if(k==='Home'){e.preventDefault();this._go(0);}
      else if(k==='End'){e.preventDefault();this._go(this._slides.length-1);}
      else if(k==='r'||k==='R'){e.preventDefault();this._go(0);}
      this._flash();
    }
    get index(){return this._index;}
    get length(){return this._slides.length;}
    goTo(i){this._go(i);}
    next(){this._go(this._index+1);}
    prev(){this._go(this._index-1);}
  }
  if(!customElements.get('deck-stage'))customElements.define('deck-stage',DeckStage);
})();
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <deck-stage id="deck"></deck-stage>

  <script type="text/babel">
/* @jsx React.createElement */

/* ─── Paleta ─────────────────────────────────────────────── */
const C = {
  brasa:'#C06018', brasaDark:'#974A12', brasaClara:'#E2A87A', brasaMin:'#F9EDE3',
  carvao:'#181614', grafite:'#3D3A36', pedra:'#8C8880',
  areia:'#E8E4DC', offwhite:'#F5F2EC',
  resultado:'#1A7A4A', critico:'#B52A2A',
};

/* ─── Tipografia base para canvas 1920×1080 ──────────────── */
// Tudo em px absolutos. O deck-stage escala o canvas inteiro para caber na tela.
const T = {
  eyebrow:  { fontSize:20, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:C.brasa },
  eyebrowLt:{ fontSize:20, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase', color:C.brasaClara },
  h1:       { fontSize:96, fontWeight:700, lineHeight:1.0, letterSpacing:'-.02em', color:C.carvao },
  h2:       { fontSize:64, fontWeight:700, lineHeight:1.1, letterSpacing:'-.01em', color:C.carvao },
  h2lg:     { fontSize:72, fontWeight:700, lineHeight:1.05, letterSpacing:'-.01em', color:C.carvao },
  h3:       { fontSize:40, fontWeight:700, lineHeight:1.2, color:C.carvao },
  body:     { fontSize:28, fontWeight:400, lineHeight:1.65, color:C.grafite },
  bodyLg:   { fontSize:32, fontWeight:400, lineHeight:1.6, color:C.grafite },
  bodySm:   { fontSize:24, fontWeight:400, lineHeight:1.6, color:C.grafite },
  caption:  { fontSize:18, fontWeight:400, letterSpacing:'.1em', textTransform:'uppercase', color:C.pedra },
  label:    { fontSize:20, fontWeight:700, letterSpacing:'.08em', color:C.pedra },
};

/* ─── Logo ───────────────────────────────────────────────── */
function Logo({ dark=false, height=40 }) {
  const fg = dark ? C.offwhite : C.carvao;
  return (
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 240"
         width={height*(1300/240)} height={height} style={{display:'block',flexShrink:0}} aria-label="Hurtz">
      <g fill={fg}>
        <polygon points="55,79 215,2 215,39 55,116"/>
        <polygon points="2,182 271,53 271,89 2,218"/>
        <polygon points="121,201 301,115 301,152 121,237"/>
      </g>
      <rect x="380" y="20" width="6" height="200" fill={C.brasa}/>
      <text x="450" y="178" fontFamily="Inter,Helvetica,Arial,sans-serif"
            fontWeight="700" fontSize="170" letterSpacing="14" fill={fg}>HURTZ</text>
    </svg>
  );
}

/* ─── Layout helpers ─────────────────────────────────────── */
const Slide = ({bg=C.offwhite, children, style={}}) => (
  <section style={{
    width:'100%', height:'100%', background:bg,
    display:'flex', flexDirection:'column',
    fontFamily:"Inter,'Helvetica Neue',Helvetica,Arial,sans-serif",
    ...style
  }}>
    {children}
  </section>
);

/* Coluna central com padding lateral fixo */
const Body = ({children, style={}}) => (
  <div style={{flex:1, display:'flex', flexDirection:'column', justifyContent:'center',
    padding:'0 112px', ...style}}>
    {children}
  </div>
);

const Hdr = ({dark=false}) => (
  <div style={{padding:'48px 112px 0', flexShrink:0}}>
    <Logo dark={dark} height={36}/>
  </div>
);

const Ftr = ({n, t, dark=false}) => (
  <div style={{padding:'0 112px 40px', flexShrink:0,
    display:'flex', justifyContent:'space-between', alignItems:'flex-end'}}>
    <span style={{...T.caption, color: dark ? 'rgba(245,242,236,.35)' : C.pedra}}>
      Confidencial · {new Date().getFullYear()} Hurtz Company
    </span>
    {n && <span style={{...T.caption, color: dark ? 'rgba(245,242,236,.35)' : C.pedra}}>
      {String(n).padStart(2,'0')} / {String(t).padStart(2,'0')}
    </span>}
  </div>
);

const Eyebrow = ({children, light=false}) => (
  <p style={{...(light ? T.eyebrowLt : T.eyebrow), margin:'0 0 20px 0'}}>{children}</p>
);

const DA = () => <div style={{height:3, width:80, background:C.brasa, margin:'0 0 40px 0'}}/>;

/* Placeholder visual para foto */
const Photo = ({w=300, h=300, label='Foto', radius=8}) => (
  <div style={{width:w, height:h, borderRadius:radius, flexShrink:0,
    background:C.areia, border:`3px dashed ${C.pedra}`,
    display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:12}}>
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
         stroke={C.pedra} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <span style={{...T.caption, fontSize:16}}>{label}</span>
  </div>
);

const Quote = ({w='100%', h=140}) => (
  <div style={{width:w, minHeight:h, borderRadius:8, flexShrink:0,
    background:C.areia, border:`3px dashed ${C.pedra}`,
    display:'flex', alignItems:'center', justifyContent:'center', gap:16}}>
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
         stroke={C.pedra} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>
      <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>
    </svg>
    <span style={{...T.caption, fontSize:16}}>Depoimento</span>
  </div>
);

/* ═══════════════════════════════════════════════════════════
   SLIDES
═══════════════════════════════════════════════════════════ */

/* 01 — HERO */
function S01() {
  return (
    <Slide bg={C.carvao}>
      <div style={{flex:1, display:'flex', flexDirection:'column', padding:'64px 112px'}}>
        <Logo dark height={40}/>
        <div style={{flex:1, display:'flex', flexDirection:'column', justifyContent:'center'}}>
          <p style={{...T.eyebrowLt, marginBottom:32}}>Projeto de Aceleração Intensiva · 90 dias</p>
          <h1 style={{...T.h1, fontSize:112, color:C.offwhite, marginBottom:32}}>
            3 Milhões<br/>
            <span style={{color:C.brasa}}>em 3 Meses.</span>
          </h1>
          <p style={{...T.bodyLg, color:'rgba(245,242,236,.6)', maxWidth:800}}>
            Um sistema montado, calibrado e operado pela Hurtz para você cruzar
            a barreira dos R$3M/mês em vendas de consórcio — com cronograma fechado
            e garantia de resultado.
          </p>
        </div>
        <span style={{...T.caption, color:'rgba(245,242,236,.25)'}}>Confidencial · Hurtz Company · 2026</span>
      </div>
    </Slide>
  );
}

/* 02 — EMPRESA */
function S02() {
  const Stat = ({v, l}) => (
    <div style={{flex:1, borderLeft:`3px solid ${C.brasa}`, paddingLeft:32}}>
      <div style={{fontSize:72, fontWeight:700, color:C.carvao, lineHeight:1, marginBottom:12}}>{v}</div>
      <div style={{...T.bodySm, color:C.grafite}}>{l}</div>
    </div>
  );
  return (
    <Slide>
      <Hdr/><Body>
        <Eyebrow>Hurtz Company</Eyebrow><DA/>
        <h2 style={{...T.h2, marginBottom:24}}>
          Não somos agência de tráfego.<br/>Somos operação de aquisição.
        </h2>
        <p style={{...T.body, maxWidth:900, marginBottom:64}}>
          Especialistas exclusivamente em representantes de consórcio.
          Cirurgiões, não generalistas. Cada cliente recebe um gestor dedicado,
          método próprio e sistema completo — não um painel com relatório PDF.
        </p>
        <div style={{display:'flex', gap:56}}>
          <Stat v="44" l="Clientes ativos"/>
          <Stat v="R$34M" l="Em vendas/mês nas carteiras referência"/>
          <Stat v="3" l="Gestores seniores dedicados"/>
          <Stat v="1" l="Especialização: consórcio"/>
        </div>
      </Body><Ftr n={2} t={15}/>
    </Slide>
  );
}

/* 03 — CASES */
function S03() {
  const Card = ({nome, sub, antes, resultado, foto=false}) => (
    <div style={{flex:1, background:'#fff', border:`1px solid ${C.areia}`, borderRadius:6,
      padding:40, display:'flex', flexDirection:'column', gap:24}}>
      <div style={{display:'flex', gap:20, alignItems:'center'}}>
        {foto
          ? <Photo label="Foto" w={72} h={72} radius={36}/>
          : <div style={{width:72, height:72, borderRadius:36, background:C.brasaMin,
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:32, fontWeight:700, color:C.brasa, flexShrink:0}}>
              {nome[0]}
            </div>
        }
        <div>
          <div style={{fontSize:28, fontWeight:700, color:C.carvao}}>{nome}</div>
          <div style={{...T.bodySm, color:C.pedra, marginTop:4}}>{sub}</div>
        </div>
      </div>
      {antes && (
        <div style={{...T.bodySm, color:C.pedra,
          borderLeft:`3px solid ${C.areia}`, paddingLeft:20, lineHeight:1.5}}>
          <strong style={{color:C.grafite}}>Antes:</strong> {antes}
        </div>
      )}
      <div style={{marginTop:'auto', borderTop:`1px solid ${C.areia}`, paddingTop:24}}>
        <p style={{...T.eyebrow, marginBottom:8}}>Resultado</p>
        <div style={{fontSize:52, fontWeight:700, color:C.carvao, lineHeight:1}}>{resultado}</div>
      </div>
    </div>
  );
  return (
    <Slide>
      <Hdr/><Body style={{padding:'0 112px'}}>
        <Eyebrow>Prova social</Eyebrow><DA/>
        <h2 style={{...T.h2, marginBottom:40}}>Quem já usa o sistema.</h2>
        <div style={{display:'flex', gap:28}}>
          <Card nome="Gabriela Ribeiro" sub="Ribeiro Consultoria · Matheus"
            antes="Volume inconsistente, time sobrecarregado com lead frio."
            resultado="R$14M/mês" foto/>
          <Card nome="KOE · KR Curitiba" sub="Carteira referência"
            resultado="R$10M/mês sustentados"/>
          <Card nome="InvertBenz" sub="Carteira referência"
            resultado="R$6M/mês sustentados"/>
          <Card nome="Gustavo" sub="Ideal Consórcios"
            antes="Sem histórico de tráfego no mesmo volume."
            resultado="R$4M no 1º mês" foto/>
        </div>
        <div style={{marginTop:28, padding:'24px 32px', background:C.brasaMin,
          borderLeft:`4px solid ${C.brasa}`, borderRadius:4}}>
          <span style={{...T.body, color:C.carvao}}>
            <strong>R$34M/mês</strong> em vendas consolidadas nessas 4 carteiras.
            Todas usam o mesmo sistema.
          </span>
        </div>
      </Body><Ftr n={3} t={15}/>
    </Slide>
  );
}

/* 04 — PROBLEMA */
function S04() {
  const Row = ({ok, text}) => (
    <div style={{display:'flex', gap:20, alignItems:'flex-start',
      padding:'20px 24px', borderBottom:`1px solid ${C.areia}`, fontSize:26}}>
      <span style={{color: ok ? C.resultado : C.critico, fontSize:28, flexShrink:0, marginTop:2}}>
        {ok ? '✓' : '✕'}
      </span>
      <span style={{color: ok ? C.carvao : C.pedra, lineHeight:1.4}}>{text}</span>
    </div>
  );
  return (
    <Slide>
      <Hdr/><Body style={{flexDirection:'row', gap:96, padding:'0 112px', alignItems:'center'}}>
        <div style={{flex:1}}>
          <Eyebrow>O problema</Eyebrow><DA/>
          <h2 style={{...T.h2, marginBottom:24}}>O que toda agência ignora.</h2>
          <p style={{...T.body, marginBottom:40}}>
            Você já contratou uma agência. Provavelmente mais de uma.
            O resultado é sempre o mesmo: planilha com nome e telefone,
            time gasta 80% do tempo ligando para quem não vai comprar.
          </p>
          <p style={{...T.body, color:C.carvao, fontWeight:600}}>
            Agências entregam contatos.<br/>
            A Hurtz entrega <span style={{color:C.brasa}}>decisão de compra classificada.</span>
          </p>
        </div>
        <div style={{width:520, flexShrink:0}}>
          <div style={{background:'#fff', border:`1px solid ${C.areia}`, borderRadius:6, overflow:'hidden'}}>
            <div style={{background:C.carvao, padding:'20px 28px'}}>
              <span style={{...T.caption, color:'rgba(245,242,236,.6)'}}>Agência padrão</span>
            </div>
            <Row ok={false} text="Nome + telefone — zero contexto"/>
            <Row ok={false} text="Seu time decide quem ligar"/>
            <Row ok={false} text="80% do tempo em lead que não vai comprar"/>
            <div style={{background:C.brasaMin, padding:'20px 28px', marginTop:8}}>
              <span style={{...T.eyebrow}}>Método Hurtz</span>
            </div>
            <Row ok text="Ficha completa com temperatura do lead"/>
            <Row ok text="Ação recomendada: ligar agora / hoje / nutrir"/>
            <Row ok text="Time foca em quem já quer comprar"/>
          </div>
        </div>
      </Body><Ftr n={4} t={15}/>
    </Slide>
  );
}

/* 05 — MECANISMO */
function S05() {
  const Step = ({n, titulo, desc}) => (
    <div style={{display:'flex', gap:24, alignItems:'flex-start'}}>
      <div style={{width:52, height:52, borderRadius:26, background:C.brasa,
        display:'flex', alignItems:'center', justifyContent:'center',
        fontWeight:700, fontSize:24, color:'#fff', flexShrink:0, marginTop:4}}>
        {n}
      </div>
      <div>
        <div style={{fontSize:28, fontWeight:700, color:C.carvao, marginBottom:6}}>{titulo}</div>
        <div style={{...T.bodySm, color:C.grafite}}>{desc}</div>
      </div>
    </div>
  );
