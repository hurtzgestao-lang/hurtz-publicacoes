<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>Hurtz Company · Projeto 3M em 3 Meses</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
:root {
  --brasa-50:#F9EDE3;--brasa-100:#F0CEB4;--brasa-200:#E2A87A;--brasa-300:#D48444;
  --brasa-400:#C06018;--brasa-600:#974A12;--brasa-700:#73380D;--brasa-800:#4E2508;--brasa-900:#2C1404;
  --brasa:var(--brasa-400);--brasa-hover:var(--brasa-600);
  --carvao:#181614;--grafite:#3D3A36;--pedra:#8C8880;--areia:#E8E4DC;--offwhite:#F5F2EC;
  --func-resultado:#1A7A4A;--func-atencao:#C06018;--func-informacao:#3A6FBF;--func-critico:#B52A2A;
  --bg:var(--offwhite);--bg-elevated:#FFFFFF;--bg-tinted:var(--brasa-50);--bg-inverse:var(--carvao);
  --fg:var(--carvao);--fg-muted:var(--grafite);--fg-subtle:var(--pedra);--fg-on-brasa:#FFFFFF;--fg-on-dark:var(--offwhite);
  --border:var(--areia);--accent:var(--brasa);--accent-hover:var(--brasa-hover);
  --font-sans:'Inter','Helvetica Neue',Helvetica,Arial,sans-serif;
  --fw-regular:400;--fw-bold:700;
  --fs-h1:36px;--fs-h2:26px;--fs-h3:18px;--fs-body:15px;--fs-small:13px;--fs-caption:11px;
  --tracking-h1:.02em;--tracking-h2:.01em;--tracking-caption:.12em;--tracking-wordmark:.18em;
  --lh-tight:1.1;--lh-heading:1.2;--lh-body:1.6;
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:24px;
  --space-6:32px;--space-7:48px;--space-8:64px;--space-9:96px;
  --radius-sm:2px;--radius-md:4px;--radius-lg:8px;--radius-pill:999px;
  --border-thin:1px solid var(--areia);--border-accent:2px solid var(--brasa);
  --content-max:1200px;
}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;background:#000;}
body{font-family:var(--font-sans);font-size:var(--fs-body);line-height:var(--lh-body);color:var(--fg);-webkit-font-smoothing:antialiased;}
h1,.h1{font-size:var(--fs-h1);font-weight:var(--fw-bold);letter-spacing:var(--tracking-h1);line-height:var(--lh-tight);margin:0;}
h2,.h2{font-size:var(--fs-h2);font-weight:var(--fw-bold);letter-spacing:var(--tracking-h2);line-height:var(--lh-heading);margin:0;}
h3,.h3{font-size:var(--fs-h3);font-weight:var(--fw-bold);line-height:var(--lh-heading);margin:0;}
p{margin:0;}
.eyebrow{font-size:var(--fs-caption);font-weight:var(--fw-bold);letter-spacing:var(--tracking-caption);text-transform:uppercase;color:var(--brasa);}
.caption{font-size:var(--fs-caption);letter-spacing:var(--tracking-caption);text-transform:uppercase;color:var(--pedra);}
.metric{font-weight:var(--fw-bold);font-size:calc(var(--fs-body)*2);line-height:1;color:var(--carvao);}
.wordmark{font-weight:var(--fw-bold);letter-spacing:var(--tracking-wordmark);text-transform:uppercase;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 28px;font-family:var(--font-sans);font-size:var(--fs-body);font-weight:var(--fw-bold);letter-spacing:.02em;border:none;border-radius:var(--radius-md);cursor:pointer;transition:background-color 120ms ease;text-decoration:none;}
.btn-primary{background:var(--brasa);color:#fff;}.btn-primary:hover{background:var(--brasa-hover);}
.btn-large{font-size:18px;padding:18px 40px;}
.card{background:#fff;border:var(--border-thin);border-radius:var(--radius-md);padding:var(--space-5);}
.divider-accent{height:2px;width:48px;background:var(--brasa);border:0;margin:0;}
  </style>
  <script>
(() => {
  const DESIGN_W_DEFAULT = 1920, DESIGN_H_DEFAULT = 1080, OVERLAY_HIDE_MS = 1800;
  const pad2 = n => String(n).padStart(2,'0');
  const VALIDATE_ATTR = 'no_overflowing_text,no_overlapping_text,slide_sized_text';
  const stylesheet = `
    :host{position:fixed;inset:0;display:block;background:#000;font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",Helvetica,Arial,sans-serif;overflow:hidden;}
    .stage{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
    .canvas{position:relative;transform-origin:center center;flex-shrink:0;background:#fff;will-change:transform;}
    ::slotted(*){position:absolute!important;inset:0!important;width:100%!important;height:100%!important;box-sizing:border-box!important;overflow:hidden;opacity:0;pointer-events:none;visibility:hidden;}
    ::slotted([data-deck-active]){opacity:1;pointer-events:auto;visibility:visible;}
    .tapzones{position:fixed;inset:0;display:flex;z-index:2147482000;pointer-events:none;}
    .tapzone{flex:1;pointer-events:auto;-webkit-tap-highlight-color:transparent;}
    .tapzone--mid{pointer-events:none;}
    .overlay{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.78);color:#fff;border-radius:999px;padding:6px 14px;font-size:13px;opacity:0;transition:opacity .22s ease;pointer-events:none;z-index:2147483000;user-select:none;}
    .overlay[data-visible]{opacity:1;pointer-events:auto;}
    .overlay .btn{background:transparent;border:none;color:#fff;cursor:pointer;padding:4px 8px;border-radius:4px;font-size:13px;display:flex;align-items:center;gap:4px;font-family:inherit;}
    .overlay .btn:hover{background:rgba(255,255,255,.15);}
    .overlay .btn svg{width:16px;height:16px;}
    .overlay .count{font-variant-numeric:tabular-nums;min-width:40px;text-align:center;}
    .overlay .sep{opacity:.5;}
    .overlay .divider{width:1px;height:16px;background:rgba(255,255,255,.25);margin:0 4px;}
    .overlay .kbd{background:rgba(255,255,255,.15);border-radius:3px;padding:1px 5px;font-size:11px;margin-left:4px;}
    @media print{html,body{margin:0!important;padding:0!important;background:none!important;overflow:visible!important;height:auto!important;}*{-webkit-print-color-adjust:exact;print-color-adjust:exact;}}
  `;
  class DeckStage extends HTMLElement {
    constructor(){super();this._root=this.attachShadow({mode:'open'});this._slides=[];this._index=0;this._prevIndex=null;this._hideTimer=null;this._mouseIdleTimer=null;this._notes=[];this._onKey=this._onKey.bind(this);this._onResize=this._onResize.bind(this);this._onMouseMove=this._onMouseMove.bind(this);this._onSlotChange=this._onSlotChange.bind(this);this._onTapBack=this._onTapBack.bind(this);this._onTapForward=this._onTapForward.bind(this);this._render();}
    static get observedAttributes(){return['width','height'];}
    get designWidth(){return parseInt(this.getAttribute('width')||DESIGN_W_DEFAULT,10);}
    get designHeight(){return parseInt(this.getAttribute('height')||DESIGN_H_DEFAULT,10);}
    connectedCallback(){window.addEventListener('keydown',this._onKey);window.addEventListener('resize',this._onResize);window.addEventListener('mousemove',this._onMouseMove,{passive:true});}
    disconnectedCallback(){window.removeEventListener('keydown',this._onKey);window.removeEventListener('resize',this._onResize);window.removeEventListener('mousemove',this._onMouseMove);if(this._hideTimer)clearTimeout(this._hideTimer);}
    attributeChangedCallback(){if(this._canvas){this._canvas.style.width=this.designWidth+'px';this._canvas.style.height=this.designHeight+'px';this._fit();}}
    _render(){const style=document.createElement('style');style.textContent=stylesheet;const stage=document.createElement('div');stage.className='stage';const canvas=document.createElement('div');canvas.className='canvas';canvas.style.width=this.designWidth+'px';canvas.style.height=this.designHeight+'px';const slot=document.createElement('slot');slot.addEventListener('slotchange',this._onSlotChange);canvas.appendChild(slot);stage.appendChild(canvas);const tapzones=document.createElement('div');tapzones.className='tapzones export-hidden';tapzones.setAttribute('aria-hidden','true');const tzBack=document.createElement('div');tzBack.className='tapzone tapzone--back';const tzMid=document.createElement('div');tzMid.className='tapzone tapzone--mid';tzMid.style.pointerEvents='none';const tzFwd=document.createElement('div');tzFwd.className='tapzone tapzone--fwd';tzBack.addEventListener('click',this._onTapBack);tzFwd.addEventListener('click',this._onTapForward);tapzones.append(tzBack,tzMid,tzFwd);const overlay=document.createElement('div');overlay.className='overlay export-hidden';overlay.setAttribute('role','toolbar');overlay.innerHTML=`<button class="btn prev" type="button" aria-label="Previous slide"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10 3L5 8l5 5"/></svg></button><span class="count"><span class="current">1</span><span class="sep">/</span><span class="total">1</span></span><button class="btn next" type="button" aria-label="Next slide"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3l5 5-5 5"/></svg></button><span class="divider"></span><button class="btn reset" type="button">Reset<span class="kbd">R</span></button>`;
    overlay.querySelector('.prev').addEventListener('click',()=>this._go(this._index-1,'click'));overlay.querySelector('.next').addEventListener('click',()=>this._go(this._index+1,'click'));overlay.querySelector('.reset').addEventListener('click',()=>this._go(0,'click'));this._root.append(style,stage,tapzones,overlay);this._canvas=canvas;this._slot=slot;this._overlay=overlay;this._countEl=overlay.querySelector('.current');this._totalEl=overlay.querySelector('.total');this._syncPrintPageRule();}
    _syncPrintPageRule(){const id='deck-stage-print-page';let tag=document.getElementById(id);if(!tag){tag=document.createElement('style');tag.id=id;document.head.appendChild(tag);}tag.textContent='@page{size:'+this.designWidth+'px '+this.designHeight+'px;margin:0;}';}
    _onSlotChange(){this._collectSlides();this._restoreIndex();this._applyIndex({showOverlay:false,broadcast:true,reason:'init'});this._fit();}
    _collectSlides(){const assigned=this._slot.assignedElements({flatten:true});this._slides=assigned.filter(el=>{const tag=el.tagName;return tag!=='TEMPLATE'&&tag!=='SCRIPT'&&tag!=='STYLE';});this._slides.forEach((slide,i)=>{const n=i+1;let label=slide.getAttribute('data-label');if(!label){const h=slide.querySelector('h1,h2,h3,[data-title]');if(h)label=(h.textContent||'').trim().slice(0,40);}if(!label)label='Slide';slide.setAttribute('data-screen-label',`${pad2(n)} ${label}`);if(!slide.hasAttribute('data-om-validate'))slide.setAttribute('data-om-validate',VALIDATE_ATTR);slide.setAttribute('data-deck-slide',String(i));});if(this._totalEl)this._totalEl.textContent=String(this._slides.length||1);if(this._index>=this._slides.length)this._index=Math.max(0,this._slides.length-1);}
    _restoreIndex(){const h=(location.hash||'').match(/^#(\d+)$/);if(h){const n=parseInt(h[1],10)-1;if(n>=0&&n<this._slides.length)this._index=n;}}
    _applyIndex({showOverlay=true,broadcast=true,reason='init'}={}){if(!this._slides.length)return;const curr=this._index;try{history.replaceState(null,'','#'+(curr+1));}catch(e){}this._slides.forEach((s,i)=>{if(i===curr)s.setAttribute('data-deck-active','');else s.removeAttribute('data-deck-active');});if(this._countEl)this._countEl.textContent=String(curr+1);if(broadcast){try{window.postMessage({slideIndexChanged:curr},'*');}catch(e){}this.dispatchEvent(new CustomEvent('slidechange',{detail:{index:curr,total:this._slides.length,slide:this._slides[curr]||null,reason},bubbles:true,composed:true}));}this._prevIndex=curr;if(showOverlay)this._flashOverlay();}
    _flashOverlay(){if(!this._overlay)return;this._overlay.setAttribute('data-visible','');if(this._hideTimer)clearTimeout(this._hideTimer);this._hideTimer=setTimeout(()=>{this._overlay.removeAttribute('data-visible');},OVERLAY_HIDE_MS);}
    _fit(){if(!this._canvas)return;if(this.hasAttribute('noscale')){this._canvas.style.transform='none';return;}const s=Math.min(window.innerWidth/this.designWidth,window.innerHeight/this.designHeight);this._canvas.style.transform=`scale(${s})`;}
    _onResize(){this._fit();}
    _onMouseMove(){this._flashOverlay();}
    _onTapBack(e){e.preventDefault();this._go(this._index-1,'tap');}
    _onTapForward(e){e.preventDefault();this._go(this._index+1,'tap');}
    _onKey(e){const t=e.target;if(t&&(t.isContentEditable||/^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName)))return;if(e.metaKey||e.ctrlKey||e.altKey)return;const key=e.key;let handled=true;if(key==='ArrowRight'||key==='PageDown'||key===' ')this._go(this._index+1,'keyboard');else if(key==='ArrowLeft'||key==='PageUp')this._go(this._index-1,'keyboard');else if(key==='Home')this._go(0,'keyboard');else if(key==='End')this._go(this._slides.length-1,'keyboard');else if(key==='r'||key==='R')this._go(0,'keyboard');else if(/^[0-9]$/.test(key)){const n=key==='0'?9:parseInt(key,10)-1;if(n<this._slides.length)this._go(n,'keyboard');}else handled=false;if(handled){e.preventDefault();this._flashOverlay();}}
    _go(i,reason='api'){if(!this._slides.length)return;const clamped=Math.max(0,Math.min(this._slides.length-1,i));if(clamped===this._index){this._flashOverlay();return;}this._index=clamped;this._applyIndex({showOverlay:true,broadcast:true,reason});}
    get index(){return this._index;}get length(){return this._slides.length;}goTo(i){this._go(i,'api');}next(){this._go(this._index+1,'api');}prev(){this._go(this._index-1,'api');}reset(){this._go(0,'api');}
  }
  if(!customElements.get('deck-stage'))customElements.define('deck-stage',DeckStage);
})();
  </script>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>

<body>
  <deck-stage id="deck"></deck-stage>

  <script type="text/babel">
/* @jsx React.createElement */
const C = {
  brasa:'#C06018', brasaDark:'#974A12', brasaMin:'#F9EDE3', brasaClara:'#E2A87A',
  carvao:'#181614', grafite:'#3D3A36', pedra:'#8C8880',
  areia:'#E8E4DC', offwhite:'#F5F2EC',
  resultado:'#1A7A4A', critico:'#B52A2A',
};

// ── Logo SVG ────────────────────────────────────────────────────────────────
function Logo({ dark=false, height=28 }) {
  const fg   = dark ? C.offwhite : C.carvao;
  const w    = height * (1300/240);
  return (
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 240"
         width={w} height={height} style={{display:'block',flexShrink:0}} aria-label="Hurtz">
      <g fill={fg}>
        <polygon points="55,79 215,2 215,39 55,116"/>
        <polygon points="2,182 271,53 271,89 2,218"/>
        <polygon points="121,201 301,115 301,152 121,237"/>
      </g>
      <rect x="380" y="20" width="6" height="200" fill={C.brasa}/>
      <text x="450" y="178" fontFamily="Inter,Helvetica,Arial,sans-serif"
            fontWeight="700" fontSize="170" letterSpacing="14" fill={fg}>HURTZ</text>
    </svg>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────
const Slide = ({bg=C.offwhite, children, style={}}) => (
  <section style={{
    width:'100%', height:'100%', background:bg,
    display:'flex', flexDirection:'column',
    fontFamily:"Inter,'Helvetica Neue',Helvetica,Arial,sans-serif",
    ...style
  }}>
    {children}
  </section>
);

const Header = ({dark=false}) => (
  <div style={{padding:'36px 72px 0', flexShrink:0}}>
    <Logo dark={dark} height={24}/>
  </div>
);

const Footer = ({slide, total, dark=false}) => (
  <div style={{
    padding:'0 72px 28px', flexShrink:0, marginTop:'auto',
    display:'flex', justifyContent:'space-between', alignItems:'flex-end',
  }}>
    <span style={{fontSize:11, letterSpacing:'.12em', textTransform:'uppercase',
      color: dark ? 'rgba(245,242,236,.4)' : C.pedra}}>
      Confidencial · {new Date().getFullYear()} Hurtz Company
    </span>
    {slide && (
      <span style={{fontSize:11, color: dark ? 'rgba(245,242,236,.4)' : C.pedra,
        letterSpacing:'.08em'}}>
        {String(slide).padStart(2,'0')} / {String(total).padStart(2,'0')}
      </span>
    )}
  </div>
);

const Eyebrow = ({children, light=false}) => (
  <div style={{fontSize:11, fontWeight:700, letterSpacing:'.14em', textTransform:'uppercase',
    color: light ? C.brasaClara : C.brasa, marginBottom:16}}>
    {children}
  </div>
);

const DividerAccent = () => (
  <div style={{height:2, width:48, background:C.brasa, marginBottom:24}}/>
);

const PhotoPlaceholder = ({label='Foto', w=200, h=200, radius=8}) => (
  <div style={{
    width:w, height:h, borderRadius:radius, flexShrink:0,
    background:C.areia, border:`2px dashed ${C.pedra}`,
    display:'flex', alignItems:'center', justifyContent:'center',
    flexDirection:'column', gap:6,
  }}>
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke={C.pedra} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <path d="M21 15l-5-5L5 21"/>
    </svg>
    <span style={{fontSize:10, color:C.pedra, letterSpacing:'.1em', textTransform:'uppercase'}}>{label}</span>
  </div>
);

const TestimonialPlaceholder = ({w='100%', h=120}) => (
  <div style={{
    width:w, height:h, borderRadius:4, flexShrink:0,
    background:C.areia, border:`2px dashed ${C.pedra}`,
    display:'flex', alignItems:'center', justifyContent:'center',
    gap:8,
  }}>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={C.pedra} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1z"/>
      <path d="M15 21c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/>
    </svg>
    <span style={{fontSize:10, color:C.pedra, letterSpacing:'.1em', textTransform:'uppercase'}}>Depoimento</span>
  </div>
);

// ── Slides ──────────────────────────────────────────────────────────────────

// 01 HERO
function SlideHero() {
  return (
    <Slide bg={C.carvao}>
      <div style={{flex:1, display:'flex', flexDirection:'column', padding:'64px 96px'}}>
        <Logo dark height={28}/>
        <div style={{flex:1, display:'flex', flexDirection:'column', justifyContent:'center', maxWidth:960}}>
          <Eyebrow light>Projeto de Aceleração Intensiva · 90 dias</Eyebrow>
          <h1 style={{fontSize:80, fontWeight:700, lineHeight:1.0, color:C.offwhite, letterSpacing:'-.02em', marginBottom:24}}>
            3 Milhões<br/>
            <span style={{color:C.brasa}}>em 3 Meses.</span>
          </h1>
          <p style={{fontSize:20, color:'rgba(245,242,236,.65)', lineHeight:1.6, maxWidth:600}}>
            Um sistema montado, calibrado e operado pela Hurtz para você cruzar
            a barreira dos R$3M/mês em vendas de consórcio — com cronograma fechado e garantia de resultado.
          </p>
        </div>
        <div style={{display:'flex', alignItems:'center', gap:16}}>
          <span style={{fontSize:11, letterSpacing:'.12em', textTransform:'uppercase', color:'rgba(245,242,236,.3)'}}>
            Confidencial · Hurtz Company · 2026
          </span>
        </div>
      </div>
    </Slide>
  );
}

// 02 QUEM SOMOS
function SlideEmpresa() {
  const stat = (v, l) => (
    <div style={{flex:1, borderLeft:`2px solid ${C.brasa}`, paddingLeft:24}}>
      <div style={{fontSize:42, fontWeight:700, color:C.carvao, lineHeight:1}}>{v}</div>
      <div style={{fontSize:13, color:C.grafite, marginTop:8, lineHeight:1.4}}>{l}</div>
    </div>
  );
  return (
    <Slide>
      <Header/>
      <div style={{flex:1, display:'flex', flexDirection:'column', justifyContent:'center', padding:'0 96px'}}>
        <Eyebrow>Hurtz Company</Eyebrow>
        <DividerAccent/>
        <h2 style={{marginBottom:16, color:C.carvao}}>
          Não somos agência de tráfego.<br/>Somos operação de aquisição.
        </h2>
        <p style={{color:C.grafite, maxWidth:720, marginBottom:56, fontSize:17, lineHeight:1.65}}>
          Especialistas exclusivamente em representantes de consórcio.
          Cirurgiões, não generalistas. Cada cliente recebe um gestor dedicado,
          método próprio e sistema completo — não um painel com relatório PDF.
        </p>
        <div style={{display:'flex', gap:48}}>
          {stat('44','Clientes ativos')}
          {stat('R$34M','Em vendas/mês nas carteiras referência')}
          {stat('3','Gestores seniores dedicados')}
          {stat('1','Especialização: consórcio')}
        </div>
      </div>
      <Footer slide={2} total={15}/>
    </Slide>
  );
}

// 03 PROVA SOCIAL
function SlideCases() {
  const caseCard = ({nome, sub, foto, resultado, antes, photo=false}) => (
    <div style={{flex:1, background:'#fff', border:`1px solid ${C.areia}`, borderRadius:4,
      padding:28, display:'flex', flexDirection:'column', gap:16}}>
      <div style={{display:'flex', gap:16, alignItems:'center'}}>
        {photo
          ? <PhotoPlaceholder label="Foto" w={56} h={56} radius={28}/>
          : <div style={{width:56, height:56, borderRadius:28, background:C.brasaMin,
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:22, fontWeight:700, color:C.brasa, flexShrink:0}}>
              {nome[0]}
            </div>
        }
        <div>
          <div style={{fontWeight:700, fontSize:15, color:C.carvao}}>{nome}</div>
          <div style={{fontSize:12, color:C.pedra}}>{sub}</div>
        </div>
      </div>
      {antes && (
